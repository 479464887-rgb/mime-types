<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MIME Type Lookup - DevKit</title><meta name="description" content="MIME 类型查询 - 文件扩展名 ↔ MIME 类型互查"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}main{max-width:700px;margin:32px auto;padding:0 24px;flex:1}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.ta{width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6}.ta:focus{border-color:#58a6ff}.btn{padding:10px 24px;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:#21262d;color:#c9d1d9}.btn:hover{background:#30363d}.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit</div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">MIME Type Lookup</h1><p style="color:#8b949e;font-size:14px;margin-bottom:16px">MIME 类型查询 - 文件扩展名 ↔ MIME 类型互查</p><div class="tool-wrapper"><div class="actions"><input id="mt-input" placeholder="输入扩展名(如 .pdf)或MIME类型(如 image/png)" style="flex:1;padding:12px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;outline:none;font-family:mono" onkeydown="if(event.key==='Enter')lookup()"><button class="btn btn-p" onclick="lookup()">查询</button></div><div id="mt-result" style="font-size:16px;padding:20px;background:#161b22;border:1px solid #30363d;border-radius:8px;min-height:80px"></div></div></main><footer><a href="https://github.com/479464887-rgb/mime-types">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>const mimes={'html':'text/html','css':'text/css','js':'text/javascript','json':'application/json','xml':'application/xml','pdf':'application/pdf','zip':'application/zip','png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif','svg':'image/svg+xml','webp':'image/webp','ico':'image/x-icon','mp3':'audio/mpeg','wav':'audio/wav','mp4':'video/mp4','webm':'video/webm','csv':'text/csv','md':'text/markdown','ttf':'font/ttf','woff':'font/woff','woff2':'font/woff2','txt':'text/plain','yaml':'application/x-yaml','yml':'application/x-yaml','wasm':'application/wasm','tar':'application/x-tar','gz':'application/gzip','rar':'application/vnd.rar','7z':'application/x-7z-compressed','doc':'application/msword','docx':'application/vnd.openxmlformats-officedocument.wordprocessingml.document','xls':'application/vnd.ms-excel','xlsx':'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','ppt':'application/vnd.ms-powerpoint','pptx':'application/vnd.openxmlformats-officedocument.presentationml.presentation','sql':'application/sql','sh':'application/x-sh','py':'text/x-python','ts':'text/typescript','tsx':'text/typescript-jsx','jsx':'text/jsx'};function lookup(){const q=document.getElementById('mt-input').value.trim().toLowerCase().replace('.','');const r=document.getElementById('mt-result');if(!q){r.innerHTML='<span style=color:#8b949e>输入扩展名或MIME类型</span>';return}const mime=mimes[q];if(mime){r.innerHTML='<span style=color:#8b949e>.'+q+'</span> → <span style=color:#3fb950;font-weight:600;font-size:18px>'+mime+'</span>'}else{const ext=Object.entries(mimes).find(([k,v])=>v===q);if(ext){r.innerHTML='<span style=color:#8b949e>'+ext[1]+'</span> → <span style=color:#3fb950;font-weight:600;font-size:18px'>.'+ext[0]+'</span>'}else{r.innerHTML='<span style=color:#d29922'>未找到匹配</span>'}}}lookup()</script></body></html>
